
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiteCal Pro</title>
  
  <!-- Tailwind CSS CDN for styling -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React and Babel CDNs to run React directly in the browser -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    /* Premium dark-mode variables and scrollbar removal */
    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-thumb {
      background: #10b981;
      border-radius: 10px;
    }
    .custom-toast {
      animation: slideIn 0.3s ease-out;
    }
    @keyframes slideIn {
      from { transform: translate(-50%, -20px); opacity: 0; }
      to { transform: translate(-50%, 0); opacity: 1; }
    }
  </style>
</head>
<body class="bg-[#0b0f19] text-[#f1f5f9] min-h-screen">

  <div id="root"></div>

  <!-- React code with Babel transpilation -->
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // Food presets
    const PRESETS = [
      { label: '🍌 Banana', calories: 90 },
      { label: '🍎 Apple', calories: 80 },
      { label: '🥚 Boiled Egg', calories: 75 },
      { label: '🍞 Slice of Toast', calories: 120 },
      { label: '🥗 Salad Bowl', calories: 150 },
      { label: '🍗 Chicken Breast (100g)', calories: 165 },
      { label: '🥑 Half Avocado', calories: 120 },
      { label: '🥛 Glass of Milk', calories: 120 },
      { label: '🥜 Handful of Nuts', calories: 170 },
      { label: '🐟 Salmon Fillet (100g)', calories: 200 }
    ];

    function App() {
      const [theme, setTheme] = useState('dark');
      const [currentDate, setCurrentDate] = useState(new Date());
      
      // Onboarding & Profile
      const [isOnboarded, setIsOnboarded] = useState(false);
      const [username, setUsername] = useState('');
      const [dailyGoal, setDailyGoal] = useState(2000);
      
      // Meals Database
      const [mealsData, setMealsData] = useState({});
      
      // Onboarding Inputs
      const [onboardName, setOnboardName] = useState('');
      const [onboardGoal, setOnboardGoal] = useState('2000');

      // Form logging inputs
      const [mealName, setMealName] = useState('');
      const [mealCalories, setMealCalories] = useState('');
      const [mealQuantity, setMealQuantity] = useState(1);
      
      // Settings Edit Modal
      const [showGoalModal, setShowGoalModal] = useState(false);
      const [editGoalInput, setEditGoalInput] = useState('2000');
      const [editNameInput, setEditNameInput] = useState('');
      
      const [notification, setNotification] = useState(null);

      // Load initial settings on component mount
      useEffect(() => {
        const savedName = localStorage.getItem('litecal_username');
        const savedGoal = localStorage.getItem('litecal_global_goal');
        
        if (savedName && savedGoal) {
          setUsername(savedName);
          setDailyGoal(parseInt(savedGoal) || 2000);
          setIsOnboarded(true);
          setEditNameInput(savedName);
          setEditGoalInput(savedGoal);
        }

        const savedLocalData = localStorage.getItem('litecal_meals_data');
        if (savedLocalData) {
          try {
            setMealsData(JSON.parse(savedLocalData));
          } catch (e) {
            console.error("Failed to parse local storage meal logs");
          }
        }
      }, []);

      const showToast = (message, type = 'success') => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      const handleOnboardSubmit = (e) => {
        if (e) e.preventDefault();
        if (!onboardName.trim()) {
          showToast("Please enter your name", "info");
          return;
        }
        const parsedGoal = Math.max(500, parseInt(onboardGoal) || 2000);
        
        setUsername(onboardName.trim());
        setDailyGoal(parsedGoal);
        setIsOnboarded(true);

        localStorage.setItem('litecal_username', onboardName.trim());
        localStorage.setItem('litecal_global_goal', parsedGoal.toString());
        
        setEditNameInput(onboardName.trim());
        setEditGoalInput(parsedGoal.toString());
        
        showToast(`Welcome ${onboardName.trim()}! Let's hit ${parsedGoal} kcal.`);
      };

      const saveDayData = (dateKey, goalValue, itemsList) => {
        const updated = {
          ...mealsData,
          [dateKey]: {
            goal: goalValue,
            items: itemsList
          }
        };
        setMealsData(updated);
        localStorage.setItem('litecal_meals_data', JSON.stringify(updated));
      };

      const formatDateKey = (date) => {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, '0');
        const d = String(date.getDate()).padStart(2, '0');
        return `${y}-${m}-${d}`;
      };

      const activeDateKey = useMemo(() => formatDateKey(currentDate), [currentDate]);

      const activeDay = useMemo(() => {
        return mealsData[activeDateKey] || { goal: dailyGoal, items: [] };
      }, [mealsData, activeDateKey, dailyGoal]);

      const totalConsumed = useMemo(() => {
        return (activeDay.items || []).reduce((acc, curr) => acc + (curr.calories * curr.quantity), 0);
      }, [activeDay]);

      const remainingCalories = useMemo(() => {
        return (activeDay.goal || dailyGoal) - totalConsumed;
      }, [activeDay, dailyGoal, totalConsumed]);

      const weekDays = useMemo(() => {
        const temp = new Date(currentDate);
        const dayIndex = temp.getDay();
        const distanceToMonday = dayIndex === 0 ? -6 : 1 - dayIndex;
        temp.setDate(temp.getDate() + distanceToMonday);

        const dates = [];
        for (let i = 0; i < 7; i++) {
          dates.push(new Date(temp));
          temp.setDate(temp.getDate() + 1);
        }
        return dates;
      }, [currentDate]);

      const shiftWeek = (amount) => {
        const newDate = new Date(currentDate);
        newDate.setDate(currentDate.getDate() + (amount * 7));
        setCurrentDate(newDate);
      };

      const loadPreset = (preset) => {
        setMealName(preset.label);
        setMealCalories(preset.calories.toString());
        setMealQuantity(1);
        showToast(`Loaded ${preset.label}! Adjust quantity.`, "info");
      };

      const handleAddMeal = (e) => {
        if (e) e.preventDefault();
        if (!mealCalories || !mealName.trim()) {
          showToast("Please enter food name and calories", "info");
          return;
        }

        const baseCal = Math.max(0, parseInt(mealCalories) || 0);
        const qty = Math.max(1, parseInt(mealQuantity) || 1);
        const label = mealName.trim();

        const newItem = {
          id: Math.random().toString(36).substr(2, 9),
          name: label,
          calories: baseCal,
          quantity: qty,
          time: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
        };

        const updatedItems = [...(activeDay.items || []), newItem];
        saveDayData(activeDateKey, activeDay.goal || dailyGoal, updatedItems);
        
        setMealName('');
        setMealCalories('');
        setMealQuantity(1);
        showToast(`Added ${qty}x ${label}`);
      };

      const handleDeleteItem = (itemId) => {
        const updatedItems = (activeDay.items || []).filter(item => item.id !== itemId);
        saveDayData(activeDateKey, activeDay.goal || dailyGoal, updatedItems);
        showToast("Log entry removed", "info");
      };

      const handleUpdateProfile = (e) => {
        if (e) e.preventDefault();
        const newG = Math.max(500, parseInt(editGoalInput) || 2000);
        const newN = editNameInput.trim() || username;

        setUsername(newN);
        setDailyGoal(newG);
        localStorage.setItem('litecal_username', newN);
        localStorage.setItem('litecal_global_goal', newG.toString());
        
        saveDayData(activeDateKey, newG, activeDay.items || []);
        setShowGoalModal(false);
        showToast("Profile settings saved!");
      };

      // Theme toggle colors wrapper
      const bgStyle = theme === 'dark' ? 'bg-[#0b0f19] text-[#f1f5f9]' : 'bg-[#f8fafc] text-[#0f172a]';
      const cardBg = theme === 'dark' ? 'bg-[#111827] border-slate-800' : 'bg-white border-slate-200 shadow-sm';
      const inputBg = theme === 'dark' ? 'bg-slate-900 border-slate-850 text-white placeholder-slate-500 focus:border-emerald-500' : 'bg-slate-50 border-slate-200 text-slate-800 placeholder-slate-400 focus:border-emerald-400';

      // ----------------------------------------------------
      // ONBOARDING SCREEN
      // ----------------------------------------------------
      if (!isOnboarded) {
        return (
          <div className={`min-h-screen flex flex-col justify-center items-center px-4 py-8 ${bgStyle}`}>
            <div className={`w-full max-w-sm rounded-3xl p-6 border space-y-6 ${cardBg}`}>
              <div className="text-center space-y-2">
                <div className="w-12 h-12 rounded-2xl bg-emerald-500 flex items-center justify-center text-white shadow-lg mx-auto mb-2">
                  <svg className="w-6 h-6 fill-current" viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                </div>
                <h2 className="text-xl font-black tracking-tight">Welcome to LiteCal</h2>
                <p className="text-xs text-slate-400">Let's set up your profile and calorie target first.</p>
              </div>

              <form onSubmit={handleOnboardSubmit} className="space-y-4">
                <div>
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-450 block mb-1">Your Name</label>
                  <input 
                    type="text" required placeholder="e.g. Sam" value={onboardName}
                    onChange={(e) => setOnboardName(e.target.value)}
                    className={`w-full text-xs px-3.5 py-3 rounded-xl border outline-none transition ${inputBg}`}
                  />
                </div>

                <div>
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-450 block mb-1">Daily Calories Goal</label>
                  <input 
                    type="number" required min="500" max="10000" placeholder="e.g. 2000" value={onboardGoal}
                    onChange={(e) => setOnboardGoal(e.target.value)}
                    className={`w-full text-xs px-3.5 py-3 rounded-xl border outline-none transition ${inputBg}`}
                  />
                </div>

                <button type="submit" className="w-full py-3 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white font-bold text-xs uppercase tracking-wider transition">
                  Begin Tracking
                </button>
              </form>
            </div>
          </div>
        );
      }

      // ----------------------------------------------------
      // MAIN APP SCREEN
      // ----------------------------------------------------
      return (
        <div className={`min-h-screen pb-16 ${bgStyle}`}>
          
          {/* Toast Notification */}
          {notification && (
            <div className="fixed top-4 left-1/2 -translate-x-1/2 z-50 w-11/12 max-w-xs custom-toast">
              <div className="px-4 py-3 rounded-xl shadow-lg border text-xs text-center font-bold bg-emerald-500/20 border-emerald-500/30 text-emerald-300">
                {notification.message}
              </div>
            </div>
          )}

          {/* Header */}
          <header className={`sticky top-0 z-30 px-4 py-3 border-b backdrop-blur-md flex justify-between items-center ${theme === 'dark' ? 'bg-[#0b0f19]/95 border-slate-850' : 'bg-white/95 border-slate-200'}`}>
            <div className="flex items-center space-x-2">
              <div className="w-8 h-8 rounded-lg bg-emerald-500 flex items-center justify-center text-white font-bold">
                🔥
              </div>
              <div>
                <h1 className="text-xs font-black tracking-wider uppercase">LiteCal Pro</h1>
                <p className="text-[10px] text-slate-400 font-medium">Hello, <span className="font-extrabold text-emerald-400">{username}</span></p>
              </div>
            </div>

            <div className="flex items-center space-x-2">
              <button 
                onClick={() => setTheme(p => p === 'dark' ? 'light' : 'dark')}
                className={`p-2 rounded-xl border ${theme === 'dark' ? 'bg-slate-900 border-slate-800 text-slate-300' : 'bg-white border-slate-200 text-slate-600'}`}
              >
                {theme === 'dark' ? '☀️' : '🌙'}
              </button>

              <button 
                onClick={() => {
                  setEditNameInput(username);
                  setEditGoalInput((activeDay.goal || dailyGoal).toString());
                  setShowGoalModal(true);
                }}
                className={`px-3 py-2 text-[11px] font-bold rounded-xl border flex items-center space-x-1 ${theme === 'dark' ? 'bg-slate-900 border-slate-800 text-slate-300' : 'bg-white border-slate-200 text-slate-705'}`}
              >
                ✏️ <span>Goal: {activeDay.goal || dailyGoal}</span>
              </button>
            </div>
          </header>

          <main className="max-w-md mx-auto px-4 pt-4 space-y-4">

            {/* 1. Week Slider / Calendar */}
            <section className={`p-3.5 rounded-2xl border ${cardBg}`}>
              <div className="flex justify-between items-center mb-3">
                <button onClick={() => shiftWeek(-1)} className={`p-1.5 rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-750 text-slate-300' : 'bg-slate-50 border-slate-200'}`}>
                  ◀
                </button>
                <span className="text-xs font-black text-emerald-500 uppercase tracking-widest">
                  {currentDate.toLocaleDateString('en-US', { month: 'long', year: 'numeric' })}
                </span>
                <button onClick={() => shiftWeek(1)} className={`p-1.5 rounded-lg border ${theme === 'dark' ? 'bg-slate-800 border-slate-750 text-slate-300' : 'bg-slate-50 border-slate-200'}`}>
                  ▶
                </button>
              </div>

              <div className="grid grid-cols-7 gap-1">
                {weekDays.map((day, idx) => {
                  const dKey = formatDateKey(day);
                  const isSelected = dKey === activeDateKey;
                  const isToday = formatDateKey(new Date()) === dKey;
                  
                  const dayRecord = mealsData[dKey] || { goal: dailyGoal, items: [] };
                  const dayConsumed = (dayRecord.items || []).reduce((acc, curr) => acc + (curr.calories * curr.quantity), 0);
                  const dayGoal = dayRecord.goal || dailyGoal;
                  const overLimit = dayConsumed > dayGoal;

                  return (
                    <button
                      key={idx}
                      type="button"
                      onClick={() => setCurrentDate(day)}
                      className={`flex flex-col items-center py-2.5 rounded-xl transition ${
                        isSelected 
                          ? 'bg-gradient-to-br from-emerald-500 to-teal-500 text-white shadow-md' 
                          : theme === 'dark' 
                          ? 'bg-slate-900/60 border border-slate-850 text-slate-300' 
                          : 'bg-slate-50 border border-slate-150 text-slate-650'
                      }`}
                    >
                      <span className={`text-[9px] uppercase font-bold ${isSelected ? 'text-emerald-100' : 'text-slate-400'}`}>
                        {day.toLocaleDateString('en-US', { weekday: 'narrow' })}
                      </span>
                      <span className="text-xs font-black mt-0.5">{day.getDate()}</span>
                      
                      <div className="mt-1">
                        {dayConsumed > 0 ? (
                          <span className={`w-1.5 h-1.5 rounded-full inline-block ${overLimit ? 'bg-rose-500' : isSelected ? 'bg-white' : 'bg-emerald-500'}`} />
                        ) : (
                          <span className="w-1.5 h-1.5 rounded-full inline-block bg-transparent border border-slate-500/20" />
                        )}
                      </div>
                    </button>
                  );
                })}
              </div>

              <div className="mt-2.5 text-center text-[10px] font-bold text-slate-400 uppercase tracking-widest flex items-center justify-center space-x-1">
                <span>Viewing:</span>
                <span className="text-emerald-500 font-extrabold">
                  {currentDate.toLocaleDateString('en-US', { weekday: 'long', month: 'short', day: 'numeric' })}
                </span>
                {activeDateKey !== formatDateKey(new Date()) && (
                  <button onClick={() => setCurrentDate(new Date())} className="ml-2 text-3xs border border-slate-500/30 rounded-full px-2 py-0.5 hover:bg-slate-500/10">
                    Back to Today
                  </button>
                )}
              </div>
            </section>

            {/* 2. Hero Statistics */}
            <section className={`p-5 rounded-3xl border text-center space-y-1 relative overflow-hidden ${cardBg}`}>
              <span className="text-[10px] font-black uppercase tracking-widest text-slate-400">Calories Remaining</span>
              <h2 className={`text-4xl font-black ${remainingCalories >= 0 ? 'text-emerald-400' : 'text-rose-500'}`}>
                {remainingCalories} <span className="text-xs font-medium">kcal</span>
              </h2>
              <p className="text-xs font-semibold text-slate-400">
                consumed <strong className="text-emerald-500">{totalConsumed}</strong> of <span className="underline font-bold">{activeDay.goal || dailyGoal}</span> kcal
              </p>

              <div className="w-full bg-slate-800/30 h-3 rounded-full overflow-hidden mt-3">
                <div 
                  className={`h-full rounded-full transition-all duration-300 ${remainingCalories >= 0 ? 'bg-emerald-500' : 'bg-rose-500'}`}
                  style={{ width: `${Math.min(100, (totalConsumed / (activeDay.goal || dailyGoal)) * 100)}%` }}
                />
              </div>
            </section>

            {/* 3. Custom Entry Form */}
            <section className={`p-4 rounded-2xl border ${cardBg}`}>
              <h3 className="text-xs font-black uppercase tracking-wider mb-3">➕ Log Intake</h3>
              <form onSubmit={handleAddMeal} className="space-y-3">
                <div className="grid grid-cols-12 gap-2">
                  <div className="col-span-12 sm:col-span-5">
                    <label className="text-[9px] font-black text-slate-450 block mb-1">Food Name</label>
                    <input 
                      type="text" placeholder="e.g. Rice Bowl" required value={mealName}
                      onChange={(e) => setMealName(e.target.value)}
                      className={`w-full text-xs px-3 py-2 rounded-xl border outline-none ${inputBg}`}
                    />
                  </div>
                  <div className="col-span-6 sm:col-span-4">
                    <label className="text-[9px] font-black text-slate-455 block mb-1">Calories (Per Unit)</label>
                    <input 
                      type="number" placeholder="kcal" required min="0" value={mealCalories}
                      onChange={(e) => setMealCalories(e.target.value)}
                      className={`w-full text-xs px-3 py-2 rounded-xl border outline-none ${inputBg}`}
                    />
                  </div>
                  <div className="col-span-6 sm:col-span-3">
                    <label className="text-[9px] font-black text-slate-455 block mb-1">Quantity</label>
                    <div className="flex items-center rounded-xl overflow-hidden border border-slate-800 bg-slate-900/40">
                      <button type="button" onClick={() => setMealQuantity(p => Math.max(1, p - 1))} className="px-2.5 py-1 text-xs font-bold hover:bg-slate-800">-</button>
                      <input type="number" min="1" required value={mealQuantity} onChange={(e) => setMealQuantity(Math.max(1, parseInt(e.target.value) || 1))} className="w-full text-center text-xs font-bold bg-transparent outline-none py-1" />
                      <button type="button" onClick={() => setMealQuantity(p => p + 1)} className="px-2.5 py-1 text-xs font-bold hover:bg-slate-800">+</button>
                    </div>
                  </div>
                </div>

                {mealCalories && (
                  <div className="p-2 text-center rounded-lg bg-emerald-500/10 text-emerald-400 text-2xs font-extrabold uppercase">
                    Will Log Total: {parseInt(mealCalories) * mealQuantity} kcal
                  </div>
                )}

                <button type="submit" className="w-full py-2.5 rounded-xl bg-emerald-500 hover:bg-emerald-600 text-white text-xs font-bold uppercase tracking-wider transition">
                  Add to Active Intake Log
                </button>
              </form>
            </section>

            {/* 4. Food Presets */}
            <section className={`p-4 rounded-2xl border ${cardBg}`}>
              <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 block mb-2">
                Quick Food Presets
              </span>
              <div className="grid grid-cols-2 gap-2 max-h-[140px] overflow-y-auto pr-0.5">
                {PRESETS.map((p, idx) => (
                  <button
                    key={idx} type="button" onClick={() => loadPreset(p)}
                    className="flex items-center justify-between p-2.5 rounded-xl text-left border border-slate-850 bg-slate-900/40 hover:bg-slate-800 transition text-xs"
                  >
                    <span className="text-3xs font-semibold truncate">{p.label}</span>
                    <span className="text-3xs font-bold text-emerald-500">+{p.calories} kcal</span>
                  </button>
                ))}
              </div>
            </section>

            {/* 5. Food Logs for Current Day */}
            <section className={`p-4 rounded-2xl border ${cardBg}`}>
              <div className="flex justify-between items-baseline mb-3">
                <h3 className="text-xs font-black uppercase tracking-wider">Focused Intake Logs</h3>
                <span className="text-[10px] font-bold text-emerald-500 bg-emerald-500/10 px-2 py-0.5 rounded-full">
                  {totalConsumed} kcal logged
                </span>
              </div>

              {(activeDay.items || []).length === 0 ? (
                <div className="text-center py-6 text-[10px] uppercase font-bold text-slate-500">
                  No logs recorded for this day yet.
                </div>
              ) : (
                <div className="space-y-1.5">
                  {(activeDay.items || []).map((item) => (
                    <div key={item.id} className="flex items-center justify-between p-2.5 rounded-xl border border-slate-850 bg-slate-900/40 text-xs">
                      <div className="min-w-0 pr-2">
                        <span className="font-bold block truncate">{item.name}</span>
                        <span className="text-[9px] text-slate-500 uppercase">
                          {item.quantity} × {item.calories} kcal • {item.time}
                        </span>
                      </div>
                      <div className="flex items-center space-x-2">
                        <span className="font-black text-emerald-500">{item.calories * item.quantity} kcal</span>
                        <button onClick={() => handleDeleteItem(item.id)} className="p-1 text-slate-500 hover:text-rose-500">
                          🗑️
                        </button>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </section>

          </main>

          {/* EDIT BUDGET MODAL */}
          {showGoalModal && (
            <div className="fixed inset-0 z-50 bg-black/75 flex items-center justify-center p-4">
              <div className={`w-full max-w-xs rounded-3xl p-5 border shadow-2xl ${cardBg}`}>
                <h3 className="text-xs font-black uppercase tracking-wider pb-3 border-b border-slate-800/20 mb-4">
                  Edit Profile Goals
                </h3>
                <form onSubmit={handleUpdateProfile} className="space-y-4">
                  <div>
                    <label className="text-[10px] font-black text-slate-400 block mb-1">Your Name</label>
                    <input type="text" required value={editNameInput} onChange={(e) => setEditNameInput(e.target.value)} className={`w-full text-xs px-3 py-2.5 rounded-xl border outline-none ${inputBg}`} />
                  </div>
                  <div>
                    <label className="text-[10px] font-black text-slate-400 block mb-1">Daily Calorie Goal</label>
                    <input type="number" required min="500" max="10000" value={editGoalInput} onChange={(e) => setEditGoalInput(e.target.value)} className={`w-full text-xs px-3 py-2.5 rounded-xl border outline-none ${inputBg}`} />
                  </div>
                  <div className="flex space-x-2">
                    <button type="button" onClick={() => setShowGoalModal(false)} className="flex-1 py-2 rounded-xl text-xs bg-slate-800">
                      Cancel
                    </button>
                    <button type="submit" className="flex-1 py-2 rounded-xl bg-emerald-500 text-white text-xs font-bold">
                      Save
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
